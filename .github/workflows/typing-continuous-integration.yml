name: Sidebar Settings CI

on:
    pull_request:

# Ensures that only one workflow per branch will run at a time.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        outputs:
            should_run: ${{ steps.filter.outputs['sidebar-settings'] }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      sidebar-settings:
                        - 'packages/sidebar-settings/**'

    sidebar-settings-ci:
        needs: changes
        if: needs.changes.outputs.should_run == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout default branch
              uses: actions/checkout@v4
              with:
                  # Disabling shallow clone is recommended for improving relevancy of reporting
                  fetch-depth: 0

            - name: Use pnpm
              uses: pnpm/action-setup@v3
              with:
                  run_install: false

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"

            - name: Install npm dependencies
              run: pnpm i --frozen-lockfile

            - name: Lint code
              run: pnpm --stream --filter {packages/sidebar-settings} lint

            - name: Typecheck code
              run: pnpm --stream --filter {packages/sidebar-settings} typecheck
